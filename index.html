<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTKB - Trợ lý xếp thời khóa biểu</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 8px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Custom Animations */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slideInUp 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 pb-12 min-h-screen flex flex-col transition-colors duration-300">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2"></div>

    <!-- Modal Root for Confirmations -->
    <div id="modal-root"></div>

    <!-- Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-slate-200/50 dark:border-slate-800/50 transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <div class="flex items-center gap-3 text-blue-600 dark:text-blue-400">
                    <div class="w-10 h-10 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center shadow-inner">
                        <i class="fa-regular fa-calendar-days text-xl"></i>
                    </div>
                    <h1 class="font-extrabold text-xl tracking-tight text-slate-800 dark:text-slate-100">Auto<span class="text-blue-600 dark:text-blue-400">TKB</span> <span class="text-sm font-medium text-slate-400 dark:text-slate-500 hidden sm:inline-block ml-2 border-l border-slate-300 dark:border-slate-700 pl-2">- Trợ lý xếp lịch thông minh</span></h1>
                </div>
                <div class="flex items-center gap-3">
                    <nav class="flex space-x-1 sm:space-x-2 bg-slate-100/80 dark:bg-slate-800/80 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700" id="tab-navigation">
                        <!-- Tabs rendered via JS -->
                    </nav>
                    <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" title="Chuyển đổi giao diện">
                        <i class="fa-solid fa-moon dark:hidden"></i>
                        <i class="fa-solid fa-sun hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 flex-1 w-full" id="app-content">
        <!-- Views rendered via JS -->
    </main>

    <script>
        // --- INITIALIZE THEME ---
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        // --- DATA ---
        let subjects = []; // Đã xóa dữ liệu mẫu

        // --- STATE ---
        let activeTab = 'input'; // input, filters, results
        let preferredDays = [2, 3, 4, 5, 6];
        let avoidDays = [7, 8];
        let preferredGroups = []; 
        
        let generatedSchedules = [];
        let selectedScheduleIndex = 0;
        let isGenerating = false;

        // UI State cho việc hiển thị form nhập liệu nội tuyến (inline forms)
        let uiState = {
            addingGroupToSubject: null, // Lưu ID của môn học đang được thêm nhóm
            addingSessionToGroup: null, // Lưu ID của nhóm đang được thêm buổi học
        };

        // --- UTILITIES ---
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const bgColors = {
                error: 'bg-white dark:bg-slate-800 border-red-100 dark:border-red-900/50 text-red-600 dark:text-red-400',
                success: 'bg-white dark:bg-slate-800 border-emerald-100 dark:border-emerald-900/50 text-emerald-600 dark:text-emerald-400',
                info: 'bg-slate-800 dark:bg-slate-700 border-slate-700 dark:border-slate-600 text-white'
            };
            
            const icons = {
                error: '<i class="fa-solid fa-circle-exclamation text-red-500"></i>',
                success: '<i class="fa-solid fa-circle-check text-emerald-500"></i>',
                info: '<i class="fa-solid fa-circle-info text-blue-400"></i>'
            };

            toast.className = `flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-xl border ${bgColors[type]} transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `
                <div class="text-lg">${icons[type]}</div>
                <div class="font-medium text-sm">${message}</div>
            `;
            
            container.appendChild(toast);
            
            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);
            
            // Animate out and remove
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showConfirm(title, message, onConfirm) {
            const root = document.getElementById('modal-root');
            root.innerHTML = `
                <div class="fixed inset-0 z-50 flex items-center justify-center px-4">
                    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" id="modal-backdrop"></div>
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden z-10 transform transition-all animate-slide-up border border-slate-200 dark:border-slate-700">
                        <div class="p-6">
                            <div class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 flex items-center justify-center mb-4 text-xl">
                                <i class="fa-solid fa-triangle-exclamation"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-2">${title}</h3>
                            <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">${message}</p>
                        </div>
                        <div class="bg-slate-50 dark:bg-slate-900/50 px-6 py-4 flex justify-end gap-3 border-t border-slate-100 dark:border-slate-700">
                            <button onclick="closeConfirm()" class="px-4 py-2 text-sm font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200/50 dark:hover:bg-slate-700 rounded-lg transition-colors">Hủy</button>
                            <button id="modal-confirm-btn" class="px-5 py-2 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 dark:bg-red-500 dark:hover:bg-red-600 rounded-lg transition-colors shadow-sm">Đồng ý xóa</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('modal-confirm-btn').onclick = () => {
                onConfirm();
                closeConfirm();
            };
        }

        function closeConfirm() {
            document.getElementById('modal-root').innerHTML = '';
        }

        // --- NAVIGATION & RENDER ENGINE ---
        function setActiveTab(tab) {
            if (activeTab === tab) return;
            activeTab = tab;
            // Reset UI state when changing tabs
            uiState.addingGroupToSubject = null;
            uiState.addingSessionToGroup = null;
            renderAll();
        }

        function renderAll() {
            renderNavigation();
            const content = document.getElementById('app-content');
            
            if (activeTab === 'input') {
                content.innerHTML = renderInputTab();
            } else if (activeTab === 'filters') {
                content.innerHTML = renderFiltersTab();
            } else if (activeTab === 'results') {
                content.innerHTML = renderResultsTab();
            }
        }

        function renderNavigation() {
            const nav = document.getElementById('tab-navigation');
            nav.innerHTML = `
                <button onclick="setActiveTab('input')" class="px-3 sm:px-5 py-2 sm:py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center gap-2 ${activeTab === 'input' ? 'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-700'}">
                    <i class="fa-solid fa-book-open text-base"></i> <span class="hidden sm:inline">Nhập Môn</span>
                </button>
                <button onclick="setActiveTab('filters')" class="px-3 sm:px-5 py-2 sm:py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center gap-2 ${activeTab === 'filters' ? 'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-700'}">
                    <i class="fa-solid fa-sliders text-base"></i> <span class="hidden sm:inline">Ưu Tiên</span>
                </button>
                <button onclick="setActiveTab('results')" class="px-3 sm:px-5 py-2 sm:py-2.5 text-sm font-semibold rounded-lg transition-all flex items-center gap-2 ${activeTab === 'results' ? 'bg-white dark:bg-slate-700 shadow text-blue-600 dark:text-blue-400' : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-200/50 dark:hover:bg-slate-700'}">
                    <i class="fa-solid fa-wand-magic-sparkles text-base"></i> <span class="hidden sm:inline">Kết Quả</span>
                </button>
            `;
        }

        // --- DATA ACTIONS ---
        function addNewSubjectFromInput() {
            const input = document.getElementById('new-subject-name');
            if (!input) return;
            
            const name = input.value.trim();
            if (name) {
                subjects.push({ id: Date.now().toString(), name, groups: [] });
                showToast(`Đã thêm môn "${name}"`, 'success');
                renderAll();
                
                // Focus lại ô input sau khi render
                setTimeout(() => {
                    const newInput = document.getElementById('new-subject-name');
                    if (newInput) newInput.focus();
                }, 0);
            } else {
                showToast('Vui lòng nhập tên môn học!', 'error');
            }
        }

        function deleteSubject(id) {
            const subj = subjects.find(s => s.id === id);
            showConfirm('Xóa môn học', `Bạn có chắc chắn muốn xóa môn <b class="dark:text-white">${subj.name}</b> cùng toàn bộ các nhóm bên trong?`, () => {
                subjects = subjects.filter(s => s.id !== id);
                showToast('Đã xóa môn học', 'info');
                renderAll();
            });
        }

        // --- INLINE FORM: GROUP ---
        function setAddingGroup(subjectId) {
            uiState.addingGroupToSubject = subjectId;
            uiState.addingSessionToGroup = null; // Close session forms
            renderAll();
            setTimeout(() => document.getElementById(`new-group-name-${subjectId}`)?.focus(), 50);
        }

        function cancelAddingGroup() {
            uiState.addingGroupToSubject = null;
            renderAll();
        }

        function saveNewGroup(subjectId) {
            const input = document.getElementById(`new-group-name-${subjectId}`);
            const groupName = input.value.trim();
            if (groupName) {
                subjects = subjects.map(subj => {
                    if (subj.id === subjectId) {
                        subj.groups.push({ id: Date.now().toString(), name: groupName, pinned: false, sessions: [] });
                    }
                    return subj;
                });
                uiState.addingGroupToSubject = null;
                showToast(`Đã thêm nhóm ${groupName}`, 'success');
                renderAll();
            } else {
                showToast('Vui lòng nhập tên nhóm!', 'error');
                input.focus();
            }
        }

        function deleteGroup(subjectId, groupId) {
            subjects = subjects.map(subj => {
                if (subj.id === subjectId) {
                    subj.groups = subj.groups.filter(g => g.id !== groupId);
                }
                return subj;
            });
            renderAll();
        }

        function togglePinGroup(subjectId, groupId) {
            subjects = subjects.map(subj => {
                if (subj.id === subjectId) {
                    subj.groups = subj.groups.map(g => ({
                        ...g,
                        pinned: g.id === groupId ? !g.pinned : false // Only allow 1 pin per subject
                    }));
                }
                return subj;
            });
            renderAll();
        }

        // --- INLINE FORM: SESSION ---
        function setAddingSession(groupId) {
            uiState.addingSessionToGroup = groupId;
            uiState.addingGroupToSubject = null; // Close group forms
            renderAll();
        }

        function cancelAddingSession() {
            uiState.addingSessionToGroup = null;
            renderAll();
        }

        function saveNewSession(subjectId, groupId) {
            const day = parseInt(document.getElementById(`sess-day-${groupId}`).value);
            const start = parseInt(document.getElementById(`sess-start-${groupId}`).value);
            const end = parseInt(document.getElementById(`sess-end-${groupId}`).value);
            // Phòng học và Giáo viên không bắt buộc, tự động gán 'Chưa xếp' nếu bỏ trống
            const room = document.getElementById(`sess-room-${groupId}`).value.trim() || '...';
            const teacher = document.getElementById(`sess-teacher-${groupId}`).value.trim() || '...';

            if (!day || !start || !end) {
                showToast('Vui lòng điền đủ Thứ, Tiết Bắt đầu và Tiết Kết thúc!', 'error');
                return;
            }

            if (start > end) {
                showToast('Tiết bắt đầu không thể lớn hơn tiết kết thúc!', 'error');
                return;
            }

            subjects = subjects.map(subj => {
                if (subj.id === subjectId) {
                    subj.groups = subj.groups.map(g => {
                        if (g.id === groupId) {
                            g.sessions.push({ id: Date.now().toString(), day, start, end, room, teacher });
                        }
                        return g;
                    });
                }
                return subj;
            });
            
            uiState.addingSessionToGroup = null;
            showToast('Đã thêm buổi học thành công', 'success');
            renderAll();
        }

        function deleteSession(subjectId, groupId, sessionId) {
            subjects = subjects.map(subj => {
                if (subj.id === subjectId) {
                    subj.groups = subj.groups.map(g => {
                        if (g.id === groupId) {
                            g.sessions = g.sessions.filter(s => s.id !== sessionId);
                        }
                        return g;
                    });
                }
                return subj;
            });
            renderAll();
        }

        // --- PREFERENCES ACTIONS ---
        function toggleDay(day, isPreferred) {
            if (isPreferred) {
                if (preferredDays.includes(day)) {
                    preferredDays = preferredDays.filter(d => d !== day);
                } else {
                    preferredDays.push(day);
                    avoidDays = avoidDays.filter(d => d !== day);
                }
            } else {
                if (avoidDays.includes(day)) {
                    avoidDays = avoidDays.filter(d => d !== day);
                } else {
                    avoidDays.push(day);
                    preferredDays = preferredDays.filter(d => d !== day);
                }
            }
            renderAll();
        }

        function togglePreferredGroup(groupId, subjectId) {
            const subjectGroupIds = subjects.find(s => s.id === subjectId).groups.map(g => g.id);
            if (preferredGroups.includes(groupId)) {
                preferredGroups = preferredGroups.filter(id => id !== groupId);
            } else {
                // Chỉ cho phép chọn 1 nhóm ưu tiên cho mỗi môn
                preferredGroups = preferredGroups.filter(id => !subjectGroupIds.includes(id));
                preferredGroups.push(groupId);
            }
            renderAll();
        }

        // --- ALGORITHM: GENERATE SCHEDULES ---
        function startGenerating() {
            isGenerating = true;
            setActiveTab('results'); 
            
            setTimeout(() => {
                const validSchedules = [];

                // Recursive backtracking
                function backtrack(subjectIndex, currentSchedule) {
                    if (subjectIndex === subjects.length) {
                        validSchedules.push([...currentSchedule]);
                        return;
                    }

                    const currentSubject = subjects[subjectIndex];
                    
                    if (currentSubject.groups.length === 0) {
                        backtrack(subjectIndex + 1, currentSchedule);
                        return;
                    }

                    const pinnedGroup = currentSubject.groups.find(g => g.pinned);
                    const groupsToConsider = pinnedGroup ? [pinnedGroup] : currentSubject.groups;

                    for (const group of groupsToConsider) {
                        if (!hasConflict(currentSchedule, group)) {
                            currentSchedule.push({ subject: currentSubject, group });
                            backtrack(subjectIndex + 1, currentSchedule);
                            currentSchedule.pop();
                        }
                    }
                }

                // Conflict Check
                function hasConflict(schedule, newGroup) {
                    for (const item of schedule) {
                        for (const s1 of item.group.sessions) {
                            for (const s2 of newGroup.sessions) {
                                if (s1.day === s2.day) {
                                    if (Math.max(s1.start, s2.start) <= Math.min(s1.end, s2.end)) {
                                        return true; 
                                    }
                                }
                            }
                        }
                    }
                    return false;
                }

                backtrack(0, []);

                // Scoring
                const scoredSchedules = validSchedules.map(schedule => {
                    let score = 0;
                    let reasons = [];
                    const daysUsed = new Set();

                    schedule.forEach(item => {
                        if (item.group.pinned) {
                            score += 50;
                            reasons.push(`Đã xếp nhóm bắt buộc: ${item.subject.name} - ${item.group.name}`);
                        }

                        if (preferredGroups.includes(item.group.id)) {
                            score += 20;
                            reasons.push(`Đã xếp nhóm ưu tiên: ${item.subject.name} - Nhóm ${item.group.name}`);
                        }

                        item.group.sessions.forEach(session => {
                            daysUsed.add(session.day);
                            
                            if (preferredDays.includes(session.day)) {
                                score += 5;
                            }
                            if (avoidDays.includes(session.day)) {
                                score -= 15;
                                if (!reasons.includes(`Bị xếp vào ngày tránh (Thứ ${session.day})`)) {
                                    reasons.push(`Bị xếp vào ngày tránh (Thứ ${session.day})`);
                                }
                            }
                        });
                    });

                    // Bonus for compressed schedule
                    const daysCount = daysUsed.size;
                    score += (7 - daysCount) * 2; 

                    return { schedule, score, reasons: [...new Set(reasons)] };
                });

                scoredSchedules.sort((a, b) => b.score - a.score);
                
                generatedSchedules = scoredSchedules;
                selectedScheduleIndex = 0;
                isGenerating = false;
                renderAll(); 
            }, 600); 
        }

        function selectSchedule(index) {
            selectedScheduleIndex = index;
            renderAll();
        }

        // --- TEMPLATE RENDERERS ---
        function renderInputTab() {
            let html = `
            <div class="space-y-8 animate-slide-up">
                
                <!-- Main Input Section -->
                <div class="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-200/60 dark:border-slate-700/60 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500 dark:bg-blue-400"></div>
                    <div class="max-w-3xl">
                        <h2 class="text-2xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">Thêm Môn Học Mới</h2>
                        <p class="text-slate-500 dark:text-slate-400 mt-2 mb-6 text-sm">Nhập tên môn học bạn dự định đăng ký trong học kỳ này.</p>
                        
                        <div class="flex flex-col sm:flex-row gap-3">
                            <div class="relative flex-1">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-book text-slate-400 dark:text-slate-500"></i>
                                </div>
                                <input type="text" id="new-subject-name" placeholder="VD: Toán Cao Cấp, Lập Trình Web..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl pl-11 pr-4 py-3.5 focus:bg-white dark:focus:bg-slate-800 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 dark:focus:border-blue-400 outline-none transition-all font-medium text-slate-700 dark:text-slate-100" onkeypress="if(event.key === 'Enter') addNewSubjectFromInput()">
                            </div>
                            <button onclick="addNewSubjectFromInput()" class="bg-blue-600 hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 text-white px-8 py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md shadow-blue-600/20 dark:shadow-blue-900/40 transition-all hover:-translate-y-0.5 whitespace-nowrap">
                                <i class="fa-solid fa-plus text-sm"></i> Thêm Môn
                            </button>
                        </div>
                    </div>
                </div>
            `;

            if (subjects.length === 0) {
                html += `
                <div class="bg-slate-100/50 dark:bg-slate-800/50 rounded-2xl border border-dashed border-slate-300 dark:border-slate-700 p-16 text-center mt-6">
                    <div class="bg-white dark:bg-slate-800 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-5 text-blue-400 dark:text-blue-500 text-3xl shadow-sm border border-slate-100 dark:border-slate-700 rotate-3">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <h3 class="text-xl font-bold text-slate-700 dark:text-slate-200 mb-2">Chưa có dữ liệu môn học</h3>
                    <p class="text-slate-500 dark:text-slate-400 max-w-sm mx-auto">Vui lòng nhập tên môn học ở ô bên trên để bắt đầu xây dựng thời khóa biểu của bạn.</p>
                </div>`;
            } else {
                html += `<div class="grid grid-cols-1 gap-8 mt-8">`;
                
                subjects.forEach((subject, sIdx) => {
                    html += `
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200/80 dark:border-slate-700/80 overflow-hidden">
                        
                        <!-- Subject Header -->
                        <div class="bg-gradient-to-r from-slate-50 to-white dark:from-slate-800 dark:to-slate-800 px-6 py-5 border-b border-slate-100 dark:border-slate-700 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4">

                <div class="bg-white dark:bg-slate-800 border border-rose-100 dark:border-rose-900/50 rounded-3xl p-12 text-center shadow-sm max-w-2xl mx-auto mt-10">
                    <div class="w-20 h-20 bg-rose-50 dark:bg-rose-900/30 text-rose-500 dark:text-rose-400 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-3">Rất tiếc, không có lịch phù hợp!</h3>
                    <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">Có thể các môn học bắt buộc của bạn bị trùng giờ nhau, hoặc các nhóm "Bắt buộc" đang xung đột. Hãy kiểm tra lại thời gian của các nhóm lớp.</p>
                    <button onclick="setActiveTab('input')" class="bg-slate-800 dark:bg-slate-100 hover:bg-slate-900 dark:hover:bg-white text-white dark:text-slate-900 px-8 py-3.5 rounded-xl font-bold shadow-lg shadow-slate-800/20 dark:shadow-slate-100/10 transition-all">
                        Quay lại kiểm tra
                    </button>
                </div>
                </div>`;
                return html;
            }

            html += `<div class="grid grid-cols-1 xl:grid-cols-4 gap-8 items-start">`;
            
            // Left list
            html += `
                <div class="xl:col-span-1 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200/80 dark:border-slate-700 overflow-hidden flex flex-col h-[700px]">
                    <div class="bg-slate-50/80 dark:bg-slate-900/50 p-5 border-b border-slate-200 dark:border-slate-700">
                        <h3 class="font-extrabold text-slate-800 dark:text-slate-100 text-lg">Danh sách TKB</h3>
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-medium mt-1">Sắp xếp theo thứ tự điểm ưu tiên</p>
                    </div>
                    <div class="overflow-y-auto custom-scrollbar flex-1 p-3 space-y-3">
            `;
            
            generatedSchedules.forEach((item, index) => {
                const isSelected = selectedScheduleIndex === index;
                const scoreClass = item.score >= 50 ? 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400' : (item.score > 0 ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-400' : 'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300');
                const borderClass = isSelected ? 'border-blue-500 dark:border-blue-400 bg-blue-50/30 dark:bg-blue-900/20 shadow-md ring-2 ring-blue-500/20 dark:ring-blue-400/20' : 'border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500 hover:bg-slate-50 dark:hover:bg-slate-700/50 shadow-sm';
                
                html += `
                    <div onclick="selectSchedule(${index})" class="cursor-pointer p-4 rounded-xl border transition-all ${borderClass}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="font-extrabold text-slate-800 dark:text-slate-100">Lựa chọn ${index + 1}</span>
                            <span class="text-xs font-bold px-2.5 py-1 rounded-md ${scoreClass}">
                                ${item.score} điểm
                            </span>
                        </div>
                `;
                
                if (item.reasons.length > 0) {
                    html += `<div class="text-xs font-medium text-slate-500 dark:text-slate-400 space-y-1.5 mt-3">`;
                    item.reasons.slice(0, 2).forEach(r => {
                        html += `<div class="flex items-start gap-1.5 leading-tight"><i class="fa-solid fa-check text-emerald-500 mt-0.5"></i> <span>${r}</span></div>`;
                    });
                    if (item.reasons.length > 2) {
                        html += `<div class="text-slate-400 dark:text-slate-500 italic mt-1">+${item.reasons.length - 2} tiêu chí khác</div>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
            });
            html += `</div></div>`;

            // Right Grid view
            const selectedOpt = generatedSchedules[selectedScheduleIndex];
            html += `
                <div class="xl:col-span-3 flex flex-col gap-6">
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200/80 dark:border-slate-700 overflow-hidden">
                        ${renderTimetableGridHTML(selectedOpt)}
                    </div>
            `;

            // Detailed analysis
            if (selectedOpt && selectedOpt.reasons.length > 0) {
                html += `
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200/80 dark:border-slate-700 p-6 shadow-sm">
                        <h4 class="font-extrabold text-slate-800 dark:text-slate-100 mb-4 flex items-center gap-2 text-lg">
                            <div class="w-8 h-8 rounded-lg bg-amber-100 dark:bg-amber-900/40 text-amber-500 dark:text-amber-400 flex items-center justify-center"><i class="fa-solid fa-star"></i></div>
                            Phân tích điểm số (${selectedOpt.score} điểm)
                        </h4>
                        <div class="grid sm:grid-cols-2 gap-x-6 gap-y-3">
                `;
                selectedOpt.reasons.forEach(reason => {
                    html += `
                        <div class="flex items-start gap-3 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700">
                            <i class="fa-solid fa-circle-check text-emerald-500 dark:text-emerald-400 mt-0.5 text-lg"></i> 
                            <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">${reason}</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }

            html += `</div></div></div>`;
            return html;
        }

        function renderTimetableGridHTML(selectedOption) {
            if (!selectedOption) return `<div class="p-12 text-center text-slate-400 dark:text-slate-500 font-medium">Chưa có dữ liệu thời khóa biểu.</div>`;

            const days = [2, 3, 4, 5, 6, 7, 8];
            const periods = Array.from({ length: 9 }, (_, i) => i + 1);
            
            const gridMap = {};
            days.forEach(d => {
                gridMap[d] = {};
                periods.forEach(p => gridMap[d][p] = null);
            });

            // Color palette cho các môn học để dễ nhìn (Tự động xoay vòng)
            const colorClasses = [
                'bg-blue-600 dark:bg-blue-500', 
                'bg-emerald-600 dark:bg-emerald-500', 
                'bg-sky-600 dark:bg-sky-500', 
                'bg-rose-600 dark:bg-rose-500', 
                'bg-amber-600 dark:bg-amber-500', 
                'bg-violet-600 dark:bg-violet-500', 
                'bg-fuchsia-600 dark:bg-fuchsia-500', 
                'bg-teal-600 dark:bg-teal-500'
            ];

            let subjectColors = {};
            let colorIndex = 0;

            selectedOption.schedule.forEach(item => {
                if (!subjectColors[item.subject.id]) {
                    subjectColors[item.subject.id] = colorClasses[colorIndex % colorClasses.length];
                    colorIndex++;
                }

                item.group.sessions.forEach(session => {
                    gridMap[session.day][session.start] = {
                        subjectName: item.subject.name,
                        groupName: item.group.name,
                        colorClass: subjectColors[item.subject.id],
                        ...session,
                        rowSpan: session.end - session.start + 1
                    };
                    for (let p = session.start + 1; p <= session.end; p++) {
                        gridMap[session.day][p] = 'spanned';
                    }
                });
            });

            let html = `
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200 dark:divide-slate-700 text-sm border-collapse">
                    <thead class="bg-slate-50 dark:bg-slate-900/50">
                        <tr>
                            <th class="px-3 py-4 font-extrabold text-slate-600 dark:text-slate-300 text-center w-16 border-r border-slate-200 dark:border-slate-700">Tiết</th>
            `;
            
            days.forEach(d => {
                html += `<th class="px-4 py-4 font-extrabold text-slate-600 dark:text-slate-300 text-center border-r border-slate-200 dark:border-slate-700 min-w-[140px]">${d === 8 ? 'Chủ Nhật' : `Thứ ${d}`}</th>`;
            });
            
            html += `</tr></thead><tbody class="divide-y divide-slate-100 dark:divide-slate-700/50 bg-white dark:bg-slate-800">`;

            periods.forEach(period => {
                html += `<tr class="hover:bg-slate-50/50 dark:hover:bg-slate-700/30 transition-colors">`;
                html += `
                    <td class="px-2 py-3 text-center font-bold text-slate-500 dark:text-slate-400 border-r border-slate-200 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-900/20">
                        ${period}
                    </td>
                `;

                days.forEach(day => {
                    const cellData = gridMap[day][period];
                    if (cellData === 'spanned') return;

                    if (cellData) {
                        html += `
                        <td rowspan="${cellData.rowSpan}" class="p-1.5 border-r border-b border-slate-200 dark:border-slate-700 align-top">
                            <div class="h-full rounded-xl p-3 text-white shadow-sm flex flex-col gap-1 border border-transparent ${cellData.colorClass} transition-transform hover:scale-[1.02] hover:shadow-md cursor-default">
                                <div class="font-bold text-sm leading-snug mb-1">${cellData.subjectName}</div>
                                <div class="flex justify-between items-center text-white/90 text-xs font-semibold">
                                    <span class="bg-black/20 px-2 py-0.5 rounded-md">${cellData.groupName}</span>
                                    <span class="flex items-center gap-1"><i class="fa-solid fa-location-dot opacity-80"></i> ${cellData.room}</span>
                                </div>
                                <div class="text-[11px] mt-auto pt-2 flex items-center gap-1.5 font-medium text-white/80">
                                    <i class="fa-regular fa-user"></i> ${cellData.teacher}
                                </div>
                            </div>
                        </td>
                        `;
                    } else {
                        html += `<td class="p-2 border-r border-slate-100/50 dark:border-slate-700 bg-slate-50/30 dark:bg-slate-800/30"></td>`;
                    }
                });
                html += `</tr>`;
                
                // Thêm hàng phân cách "Nghỉ trưa" sau tiết 5
                if (period === 5) {
                    html += `
                    <tr class="bg-slate-100/80 dark:bg-slate-900/50 border-y-2 border-slate-200 dark:border-slate-700">
                        <td colspan="8" class="py-3 text-center text-xs font-extrabold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] shadow-inner">
                            <i class="fa-solid fa-utensils mr-2 opacity-70"></i> Giờ Nghỉ Trưa
                        </td>
                    </tr>
                    `;
                }
            });

            html += `</tbody></table></div>`;
            return html;
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderAll();
        });

    </script>
</body>
</html>
